<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp</title>
    <style>
        :root {
            --primary-color: #008CBA; 
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 0; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .topic-card {
            background: white; border-radius: 16px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s;
        }
        .topic-card:active { transform: scale(0.95); }
        
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        
        .progress-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s; }
        .progress-text { font-size: 12px; color: #888; margin-top: 5px; display: flex; justify-content: space-between;}

        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        .flashcard-container { flex: 1; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        
        .flashcard {
            width: 100%; max-width: 400px; min-height: 380px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 30px 20px; text-align: center; position: relative;
            box-sizing: border-box;
        }

        /* STYLES MỚI CHO SONG NGỮ */
        .q-group { margin-bottom: 20px; width: 100%; }
        .text-en { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; line-height: 1.3; }
        .text-vi { font-size: 16px; color: #777; font-style: italic; line-height: 1.4; }

        .a-group { 
            width: 100%; opacity: 0; transition: opacity 0.3s; 
            margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 20px;
        }
        .a-group.visible { opacity: 1; }
        .ans-en { font-size: 20px; color: var(--primary-color); font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
        .ans-vi { font-size: 15px; color: #888; font-style: italic; line-height: 1.4; }

        .tools-row { display: flex; gap: 20px; margin-top: auto; padding-top: 25px; }
        .icon-btn { 
            width: 50px; height: 50px; border-radius: 25px; 
            background: #f0f2f5; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; border: none; color: #555;
        }
        .icon-btn.primary { background: var(--primary-color); color: white; }

        .main-action-btn {
            width: 100%; padding: 18px; margin-bottom: 30px;
            background-color: var(--primary-color); color: white; 
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">Lộ trình huấn luyện</div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
            <div style="width: 60px;"></div> 
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div style="font-size: 35px; margin-bottom: 15px;">💬</div>
                
                <div class="q-group">
                    <div class="text-en" id="q-en">Question in English</div>
                    <div class="text-vi" id="q-vi">Câu hỏi tiếng Việt</div>
                </div>
                
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en">Answer in English</div>
                    <div class="ans-vi" id="a-vi">Câu trả lời tiếng Việt</div>
                </div>
                
                <div class="tools-row">
                    <button class="icon-btn" onclick="alert('V2: Phát âm câu hỏi')">🔊</button>
                    <button class="icon-btn primary" onclick="alert('V2: Thu âm')">🎙️</button>
                    <button class="icon-btn" onclick="alert('V2: Nghe mẫu câu trả lời')">🎧</button>
                </div>
            </div>
        </div>

        <button class="main-action-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
    </div>

    <script>
        // CẤU TRÚC DỮ LIỆU ĐÃ NÂNG CẤP (Thêm q_en, q_vi, a_en, a_vi)
        const appData = {
            resort: {
                id: 'resort', title: 'Ocean Dunes Resort', icon: '🏨', color: '#008CBA', progress: 50, total: 10, completed: 5,
                lessons: [
                    { 
                        q_en: 'Excuse me, where is the nearest beach?', 
                        q_vi: 'Xin lỗi, bãi biển gần nhất ở hướng nào?', 
                        a_en: 'Welcome to Ocean Dunes Resort! The beach is just a 2-minute walk from here.', 
                        a_vi: 'Chào mừng quý khách đến với Ocean Dunes Resort! Bãi biển chỉ cách đây 2 phút đi bộ ạ.' 
                    },
                    { 
                        q_en: 'Can you show me the breakfast time?', 
                        q_vi: 'Bạn có thể cho tôi biết giờ ăn sáng không?', 
                        a_en: 'Certainly! Breakfast is served at the main restaurant from 6:30 AM to 10:00 AM.', 
                        a_vi: 'Dạ chắc chắn rồi! Bữa sáng được phục vụ tại nhà hàng chính từ 6:30 sáng đến 10:00 sáng.' 
                    }
                ]
            },
            coffee: {
                id: 'coffee', title: 'Ocean Coffee', icon: '☕', color: '#8D6E63', progress: 30, total: 20, completed: 6,
                lessons: [
                    { 
                        q_en: 'It is very hot today. What do you recommend?', 
                        q_vi: 'Hôm nay trời rất nóng. Bạn có gợi ý thức uống nào không?', 
                        a_en: 'I highly recommend our signature Coconut Coffee. It is very refreshing!', 
                        a_vi: 'Tôi xin gợi ý món Cà phê Dừa đặc trưng của quán. Nó rất thanh mát ạ!' 
                    }
                ]
            },
            manager: {
                id: 'manager', title: 'Báo cáo Manager Than Duong', icon: '📊', color: '#4CAF50', progress: 80, total: 5, completed: 4,
                lessons: [
                    { 
                        q_en: 'How are the preparations for the Lunar New Year event?', 
                        q_vi: 'Công tác chuẩn bị cho sự kiện Tết Nguyên Đán thế nào rồi?', 
                        a_en: 'Manager Than Duong, all marketing materials and vouchers are ready for deployment.', 
                        a_vi: 'Thưa Manager Than Duong, tất cả các ấn phẩm marketing và voucher đã sẵn sàng triển khai.' 
                    }
                ]
            }
        };

        function renderDashboard() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            
            Object.values(appData).forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.onclick = () => openTopic(topic.id);
                card.innerHTML = `
                    <div class="topic-icon">${topic.icon}</div>
                    <div class="topic-title">${topic.title}</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${topic.progress}%; background-color: ${topic.color}"></div>
                    </div>
                    <div class="progress-text">
                        <span>Hoàn thành</span>
                        <span style="color: ${topic.color}; font-weight: bold">${topic.progress}%</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let currentLessonIndex = 0;
        let activeTopic = null;

        function openTopic(topicId) {
            activeTopic = appData[topicId];
            currentLessonIndex = 0;
            document.documentElement.style.setProperty('--primary-color', activeTopic.color);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'flex';
            document.getElementById('current-topic-title').innerText = activeTopic.title;
            loadLesson();
        }

        function goBack() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.documentElement.style.setProperty('--primary-color', '#008CBA');
            renderDashboard();
        }

        function loadLesson() {
            const lesson = activeTopic.lessons[currentLessonIndex];
            
            // Đẩy dữ liệu song ngữ vào UI
            document.getElementById('q-en').innerText = lesson.q_en;
            document.getElementById('q-vi').innerText = lesson.q_vi;
            document.getElementById('a-en').innerText = lesson.a_en;
            document.getElementById('a-vi').innerText = lesson.a_vi;
            
            document.getElementById('a-group').classList.remove('visible');
            const mainBtn = document.querySelector('.main-action-btn');
            mainBtn.innerText = "Xem gợi ý trả lời";
            mainBtn.onclick = showAnswer;
        }

        function showAnswer() {
            document.getElementById('a-group').classList.add('visible');
            const mainBtn = document.querySelector('.main-action-btn');
            mainBtn.innerText = "Câu tiếp theo ➔";
            mainBtn.onclick = nextLesson;
        }

        function nextLesson() {
            currentLessonIndex++;
            if (currentLessonIndex >= activeTopic.lessons.length) {
                alert("Hoàn tất! Hệ thống sẽ cập nhật % tiến độ ở Version 3.");
                goBack();
            } else {
                loadLesson();
            }
        }

        renderDashboard();
    </script>
</body>
</html>
