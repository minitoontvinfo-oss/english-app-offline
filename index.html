<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp V2.3</title>
    <style>
        :root { --primary-color: #008CBA; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .info-icon { cursor: pointer; font-size: 24px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .topic-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
        .topic-card:active { transform: scale(0.95); }
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s; }
        
        /* --- UI INFO SCREEN --- */
        #info-screen { display: none; padding: 20px; height: 100vh; background: var(--bg-color); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .info-content { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 20px;}
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        .voice-dropdown { width: 100%; max-width: 400px; padding: 12px 15px; margin: 0 auto 15px auto; border-radius: 12px; border: 1px solid #ddd; display: block; }
        .speed-control-box { width: 100%; max-width: 400px; margin: 0 auto 15px auto; padding: 10px 15px; background: white; border-radius: 12px; border: 1px solid #ddd; display: flex; align-items: center; gap: 10px; }
        
        .flashcard-container { flex: 1; display: flex; align-items: flex-start; justify-content: center; }
        .flashcard { width: 100%; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px 20px; text-align: center; box-sizing: border-box; }
        .q-group { margin-bottom: 20px; width: 100%; }
        .text-en { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; }
        .text-vi { font-size: 16px; color: #777; font-style: italic; }
        .a-group { width: 100%; opacity: 0; transition: opacity 0.3s; margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 20px; }
        .a-group.visible { opacity: 1; }
        .voice-status { width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: bold; display: none; background: #f9f9f9; }
        .tools-row { display: flex; gap: 20px; margin-top: auto; padding-top: 25px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 25px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; border: none; font-size: 24px; cursor: pointer; }
        .icon-btn.primary { background: var(--primary-color); color: white; }
        .main-action-btn { width: 100%; padding: 18px; margin-bottom: 10px; background-color: var(--primary-color); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        #ai-check-btn { background-color: #6c5ce7; display: none; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">
            Lộ trình huấn luyện 
            <span class="info-icon" onclick="showInfo()">ℹ️</span>
        </div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="info-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="hideInfo()">❮ Quay lại</div>
            <div class="learning-title">Thông tin Ứng dụng</div>
        </div>
        <div class="info-content">
            <h3>Phiên bản: <b>V2.3</b></h3>
            <p>Đã cập nhật tính năng AI Check & Tab thông tin.</p>
        </div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
        </div>

        <select id="voice-select" class="voice-dropdown"></select>
        <div class="speed-control-box">
            <span>Tốc độ:</span>
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1.0" style="flex:1;">
            <span id="rate-value">1.0x</span>
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div class="q-group">
                    <div class="text-en" id="q-en"></div>
                    <div class="text-vi" id="q-vi"></div>
                </div>
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en"></div>
                    <div class="ans-vi" id="a-vi"></div>
                </div>
                <div class="voice-status" id="voice-status"></div>
                <div class="tools-row">
                    <button class="icon-btn" onclick="playAudio('q')">🔊</button>
                    <button class="icon-btn primary" id="mic-btn" onclick="startRecording()">🎙️</button>
                    <button class="icon-btn" onclick="playAudio('a')">🎧</button>
                </div>
            </div>
        </div>

        <button class="main-action-btn" id="main-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
        <button class="main-action-btn" id="ai-check-btn" onclick="checkWithAI()">🤖 Chấm điểm chuyên gia (AI)</button>
    </div>

    <script>
        let appData = {};
        let currentLessonIndex = 0;
        let activeTopic = null;
        let recognition;

        async function loadDatabase() {
            try { const res = await fetch('database.json'); appData = await res.json(); renderDashboard(); }
            catch (e) { alert("Lỗi file database.json!"); }
        }
        loadDatabase();

        function showInfo() { document.getElementById('info-screen').style.display = 'flex'; }
        function hideInfo() { document.getElementById('info-screen').style.display = 'none'; }
        
        function renderDashboard() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            Object.values(appData).forEach(t => {
                const c = document.createElement('div'); c.className='topic-card'; c.onclick=()=>openTopic(t.id);
                c.innerHTML=`<div class="topic-icon">${t.icon}</div><div class="topic-title">${t.title}</div>`;
                grid.appendChild(c);
            });
        }

        function openTopic(id) { activeTopic = appData[id]; currentLessonIndex = 0; document.getElementById('dashboard').style.display = 'none'; document.getElementById('learning-screen').style.display = 'flex'; loadLesson(); }
        function goBack() { document.getElementById('learning-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
        function loadLesson() {
            const l = activeTopic.lessons[currentLessonIndex];
            document.getElementById('q-en').innerText = l.q_en; document.getElementById('q-vi').innerText = l.q_vi;
            document.getElementById('a-en').innerText = l.a_en; document.getElementById('a-vi').innerText = l.a_vi;
            document.getElementById('a-group').classList.remove('visible');
            document.getElementById('voice-status').style.display = 'none';
            document.getElementById('ai-check-btn').style.display = 'none';
            document.getElementById('main-btn').innerText = "Xem gợi ý trả lời";
            document.getElementById('main-btn').onclick = showAnswer;
        }
        function showAnswer() { document.getElementById('a-group').classList.add('visible'); document.getElementById('main-btn').innerText = "Câu tiếp theo ➔"; document.getElementById('main-btn').onclick = () => { currentLessonIndex++; loadLesson(); }; }

        async function checkWithAI() {
            const status = document.getElementById('voice-status');
            const text = status.getAttribute('data-spoken');
            const target = activeTopic.lessons[currentLessonIndex].a_en;
            status.innerHTML = "🤖 AI đang phân tích...";
            const API_KEY = "YOUR_API_KEY"; // Nhập Key tại đây
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Chấm điểm câu "${text}" so với "${target}"` }] }] })
                });
                const d = await res.json();
                status.innerHTML = `<b>AI:</b> ${d.candidates[0].content.parts[0].text}`;
            } catch(e) { status.innerText = "Lỗi kết nối AI"; }
        }

        function checkPronunciation(spoken) {
            const status = document.getElementById('voice-status');
            status.style.display = 'block';
            status.setAttribute('data-spoken', spoken);
            status.innerHTML = `✅ "${spoken}"`;
            document.getElementById('ai-check-btn').style.display = 'block';
        }

        // --- (Giữ nguyên logic Audio & Voice cũ của bạn) ---
        function startRecording() { 
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.onresult = (e) => checkPronunciation(e.results[0][0].transcript);
            recognition.start();
        }
        function playAudio(t) { /* ...logic audio cũ... */ }
        function populateVoiceList() { /* ...logic giọng đọc cũ... */ }
        populateVoiceList();
    </script>
</body>
</html>
