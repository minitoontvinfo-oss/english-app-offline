<script>
        let appData = {}; // Biến chứa dữ liệu
        let currentLessonIndex = 0;
        let activeTopic = null;

        // Tự động load dữ liệu khi mở App
        async function loadDatabase() {
            try {
                const response = await fetch('database.json');
                appData = await response.json();
                renderDashboard(); // Chỉ render sau khi đã load xong dữ liệu
            } catch (error) {
                console.error("Lỗi load database:", error);
                alert("Không tìm thấy file database.json!");
            }
        }

        // Gọi hàm load ngay khi app khởi động
        loadDatabase();

        /* ... Các hàm còn lại giữ nguyên (renderDashboard, openTopic, playAudio...) ... */
        /* ... Chỉ cần đảm bảo hàm renderDashboard và các hàm xử lý gọi appData sau khi đã load xong ... */
