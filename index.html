<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp</title>
    <style>
        /* Biến màu sắc toàn cục - Sẽ thay đổi bằng JS khi chọn chủ đề */
        :root {
            --primary-color: #008CBA; /* Mặc định */
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            margin: 0; 
            padding: 0; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .topic-card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .topic-card:active { transform: scale(0.95); }
        
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        
        /* Thanh tiến trình mini */
        .progress-bar-bg {
            width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s;
        }
        .progress-text { font-size: 12px; color: #888; margin-top: 5px; display: flex; justify-content: space-between;}

        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        .flashcard-container { flex: 1; display: flex; align-items: center; justify-content: center; margin-top: 20px; }
        
        .flashcard {
            width: 100%; max-width: 400px; height: 350px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 30px; text-align: center; position: relative;
        }

        .question-text { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .answer-text { font-size: 20px; color: var(--primary-color); font-weight: 600; opacity: 0; transition: opacity 0.3s; }
        .answer-text.visible { opacity: 1; }

        /* Nút công cụ V1 (Sẽ gắn logic thu âm/phát âm ở V2) */
        .tools-row { display: flex; gap: 20px; margin-top: 40px; }
        .icon-btn { 
            width: 50px; height: 50px; border-radius: 25px; 
            background: #f0f2f5; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; border: none; color: #555;
        }
        .icon-btn.primary { background: var(--primary-color); color: white; }

        .main-action-btn {
            width: 100%; padding: 18px; margin-bottom: 30px;
            background-color: var(--primary-color); color: white; 
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">Lộ trình huấn luyện</div>
        <div class="grid-container" id="topic-grid">
            </div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
            <div style="width: 60px;"></div> </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div style="font-size: 40px; margin-bottom: 15px;">💬</div>
                
                <div class="question-text" id="q-text">Khách phàn nàn: "Phòng của tôi có mùi thuốc lá."</div>
                <div class="answer-text" id="a-text">I sincerely apologize. I will have housekeeping clean it immediately.</div>
                
                <div class="tools-row">
                    <button class="icon-btn" onclick="alert('V2: Phát âm thanh câu hỏi')">🔊</button>
                    <button class="icon-btn primary" onclick="alert('V2: Bắt đầu thu âm chấm điểm')">🎙️</button>
                    <button class="icon-btn" onclick="alert('V2: Nghe mẫu câu trả lời')">🎧</button>
                </div>
            </div>
        </div>

        <button class="main-action-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
    </div>

    <script>
        // CẤU TRÚC DỮ LIỆU CỐT LÕI (Sẽ kết nối IndexedDB ở V3)
        const appData = {
            resort: {
                id: 'resort', title: 'Ocean Dunes Resort', icon: '🏨', color: '#008CBA', progress: 45, total: 10, completed: 4,
                lessons: [
                    { q: 'Khách hỏi đường ra bãi biển', a: 'Walk straight and turn right at the pool.' },
                    { q: 'Thông báo giờ ăn sáng', a: 'Breakfast is served from 6 AM to 10 AM.' }
                ]
            },
            coffee: {
                id: 'coffee', title: 'Ocean Coffee', icon: '☕', color: '#8D6E63', progress: 10, total: 20, completed: 2,
                lessons: [
                    { q: 'Giới thiệu món đặc biệt', a: 'Our signature drink is the Coconut Coffee.' }
                ]
            },
            manager: {
                id: 'manager', title: 'Báo cáo Manager Than Duong', icon: '📊', color: '#4CAF50', progress: 80, total: 5, completed: 4,
                lessons: [
                    { q: 'Báo cáo doanh thu sự kiện', a: 'The event revenue exceeded our target by 15%.' }
                ]
            }
        };

        // RENDER DASHBOARD
        function renderDashboard() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            
            Object.values(appData).forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.onclick = () => openTopic(topic.id);
                card.innerHTML = `
                    <div class="topic-icon">${topic.icon}</div>
                    <div class="topic-title">${topic.title}</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${topic.progress}%; background-color: ${topic.color}"></div>
                    </div>
                    <div class="progress-text">
                        <span>Hoàn thành</span>
                        <span style="color: ${topic.color}; font-weight: bold">${topic.progress}%</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ĐIỀU HƯỚNG VÀ LOGIC MÀN HÌNH HỌC
        let currentLessonIndex = 0;
        let activeTopic = null;

        function openTopic(topicId) {
            activeTopic = appData[topicId];
            currentLessonIndex = 0;
            
            // Dynamic Theming: Đổi màu UI theo chủ đề
            document.documentElement.style.setProperty('--primary-color', activeTopic.color);
            
            // Chuyển màn hình
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'flex';
            document.getElementById('current-topic-title').innerText = activeTopic.title;
            
            loadLesson();
        }

        function goBack() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            // Trả màu về mặc định
            document.documentElement.style.setProperty('--primary-color', '#008CBA');
            renderDashboard(); // Render lại lỡ có update %
        }

        function loadLesson() {
            const lesson = activeTopic.lessons[currentLessonIndex];
            document.getElementById('q-text').innerText = lesson.q;
            document.getElementById('a-text').innerText = lesson.a;
            
            // Reset trạng thái UI
            document.getElementById('a-text').classList.remove('visible');
            const mainBtn = document.querySelector('.main-action-btn');
            mainBtn.innerText = "Xem gợi ý trả lời";
            mainBtn.onclick = showAnswer;
        }

        function showAnswer() {
            document.getElementById('a-text').classList.add('visible');
            const mainBtn = document.querySelector('.main-action-btn');
            mainBtn.innerText = "Câu tiếp theo ➔";
            mainBtn.onclick = nextLesson;
        }

        function nextLesson() {
            currentLessonIndex++;
            if (currentLessonIndex >= activeTopic.lessons.length) {
                alert("Bạn đã hoàn thành chủ đề này!");
                goBack();
            } else {
                loadLesson();
            }
        }

        // Khởi chạy App
        renderDashboard();
    </script>
</body>
</html>
