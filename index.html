<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp V2.1</title>
    <style>
        :root {
            --primary-color: #008CBA; 
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .topic-card {
            background: white; border-radius: 16px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s;
        }
        .topic-card:active { transform: scale(0.95); }
        
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        
        .progress-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s; }
        
        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 20px;}
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        /* UI Nút chọn giọng đọc & Tốc độ mới */
        .voice-dropdown {
            width: 100%; max-width: 400px; padding: 12px 15px; margin: 0 auto 15px auto;
            border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 14px;
            background-color: white; color: #333; outline: none; appearance: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: block;
        }
        .speed-control-box {
            width: 100%; max-width: 400px; margin: 0 auto 15px auto; padding: 10px 15px;
            background: white; border-radius: 12px; border: 1px solid #ddd;
            display: flex; align-items: center; gap: 10px; font-size: 14px;
        }

        .flashcard-container { flex: 1; display: flex; align-items: flex-start; justify-content: center; }
        
        .flashcard {
            width: 100%; max-width: 400px; min-height: 400px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 30px 20px; text-align: center; box-sizing: border-box;
        }

        .q-group { margin-bottom: 20px; width: 100%; }
        .text-en { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; line-height: 1.3; }
        .text-vi { font-size: 16px; color: #777; font-style: italic; line-height: 1.4; }

        .a-group { 
            width: 100%; opacity: 0; transition: opacity 0.3s; 
            margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 20px;
        }
        .a-group.visible { opacity: 1; }
        .ans-en { font-size: 20px; color: var(--primary-color); font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
        .ans-vi { font-size: 15px; color: #888; font-style: italic; line-height: 1.4; }

        .voice-status {
            width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px;
            font-size: 14px; font-weight: bold; display: none; background: #f9f9f9; box-sizing: border-box;
        }

        .tools-row { display: flex; gap: 20px; margin-top: auto; padding-top: 25px; }
        .icon-btn { 
            width: 50px; height: 50px; border-radius: 25px; 
            background: #f0f2f5; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; border: none; color: #555; transition: background 0.3s;
        }
        .icon-btn.primary { background: var(--primary-color); color: white; }
        .icon-btn.recording { background: #e74c3c; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .main-action-btn {
            width: 100%; padding: 18px; margin-bottom: 30px;
            background-color: var(--primary-color); color: white; 
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

	/* Style cho tính năng Info và AI Check */
        #info-screen { display: none; padding: 20px; height: 100vh; background: var(--bg-color); position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; box-sizing: border-box; }
        .info-content { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .version-tag { background: var(--primary-color); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
        #ai-check-btn { background-color: #6c5ce7; display: none; }
        .info-icon { cursor: pointer; font-size: 24px; }
#ai-check-btn { background-color: #6c5ce7; display: none; }
    </style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<div id="login-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: white; position: fixed; top: 0; left: 0; width: 100%; z-index: 9999;">
        <div style="font-size: 50px; margin-bottom: 20px;">🏢</div>
        <h2 style="margin-bottom: 10px; color: var(--primary-color);">Ocean Training Hub</h2>
        <p style="color: #666; margin-bottom: 30px; text-align: center; max-width: 80%;">Hệ thống huấn luyện nghiệp vụ nội bộ</p>
        <button onclick="loginWithGoogle()" style="background: white; border: 1px solid #ddd; padding: 15px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24px" height="24px"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
            Đăng nhập với Google
        </button>
        <p id="login-status" style="margin-top: 15px; color: #666; font-size: 14px;"></p>
    </div>


    <div id="dashboard">
        <div class="header-title">
            <span>Lộ trình huấn luyện</span>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="user-points-display" style="font-size: 16px; background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    ⭐ 0 Điểm
                </div>
                <span class="info-icon" onclick="showInfo()">ℹ️</span>
            </div>
        </div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
            <div style="width: 60px;"></div> 
        </div>

        <select id="voice-select" class="voice-dropdown"></select>
        
        <div class="speed-control-box">
            <span>Tốc độ:</span>
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1.0" style="flex:1;">
            <span id="rate-value">1.0x</span>
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div style="font-size: 35px; margin-bottom: 15px;">💬</div>
                
                <div class="q-group">
                    <div class="text-en" id="q-en"></div>
                    <div class="text-vi" id="q-vi"></div>
                </div>
                
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en"></div>
                    <div class="ans-vi" id="a-vi"></div>
                </div>

                <div class="voice-status" id="voice-status"></div>
                
                <div class="tools-row">
                    <button class="icon-btn" onclick="playAudio('q')">🔊</button>
                    <button class="icon-btn primary" id="mic-btn" onclick="startRecording()">🎙️</button>
                    <button class="icon-btn" onclick="playAudio('a')">🎧</button>
                </div>
            </div>
        </div>

        <button class="main-action-btn" id="main-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
	<button class="main-action-btn" id="ai-check-btn" onclick="checkWithAI()" style="background-color: #6c5ce7; display: none;">🤖 Chấm điểm chuyên gia (AI)</button>
    </div>

    <script>

// BƯỚC 1: DÁN ĐOẠN FIREBASE CONFIG BẠN VỪA COPY TRÊN WEB VÀO ĐÂY
        const firebaseConfig = {
            apiKey: "AIzaSyDoBoeAyxWeoYiAQkudVi8ZS3uQJVGvjXc",
            authDomain: "app-learning-english-60a96.firebaseapp.com",
            projectId: "app-learning-english-60a96",
            storageBucket: "app-learning-english-60a96.firebasestorage.app",
            messagingSenderId: "248531393253",
            appId: "1:248531393253:web:d3afdcbedf576445dd920c"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

// ==========================================
        // HỆ THỐNG ĐĂNG NHẬP & ĐIỂM SỐ CLOUD
        // ==========================================
        let currentUser = null;
        let currentPoints = 0;

        // 1. Hàm xử lý nút bấm
        function loginWithGoogle() {
            const statusText = document.getElementById('login-status');
            if(statusText) statusText.innerText = "Đang mở cửa sổ đăng nhập...";
            
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch((error) => {
                console.error("Lỗi Google Auth:", error);
                if(statusText) statusText.innerText = "Lỗi đăng nhập: " + error.message;
            });
        }

        // 2. Lắng nghe trạng thái Firebase
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                
                // Cập nhật giao diện
                const headerTitle = document.querySelector('.header-title');
                if(headerTitle) {
                    const firstName = user.displayName ? user.displayName.split(" ")[0] : "Bạn";
                    headerTitle.innerHTML = `
                        <span>Xin chào, ${firstName}!</span>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div id="user-points-display" style="font-size: 16px; background: #fff3cd; color: #856404; padding: 5px 12px; border-radius: 20px; font-weight: bold; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">⭐ 0 Điểm</div>
                            <span class="info-icon" onclick="showInfo()">ℹ️</span>
                        </div>
                    `;
                }

                // Lưu hồ sơ lên Cloud
                db.collection("users").doc(user.uid).set({
                    name: user.displayName || "Thành viên Ostock",
                    email: user.email,
                    photoURL: user.photoURL,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }) 
                .then(() => fetchUserData())
                .catch((err) => console.error("Lỗi lưu hồ sơ:", err));

            } else {
                document.getElementById('login-screen').style.display = 'flex';
            }
        });

        // 3. Hàm tải điểm từ Cloud về
        function fetchUserData() {
            if (!currentUser) return;
            db.collection("users").doc(currentUser.uid).get().then((doc) => {
                currentPoints = (doc.exists && doc.data().points) ? doc.data().points : 0;
                const pointDisplay = document.getElementById('user-points-display');
                if(pointDisplay) {
                    pointDisplay.style.display = 'block';
                    pointDisplay.innerHTML = `⭐ ${currentPoints} Điểm`;
                }
            });
        }

        // 4. Hàm cộng điểm
        function addPoints(pointsToAdd) {
            if (!currentUser) return;
            currentPoints += pointsToAdd;
            const pointDisplay = document.getElementById('user-points-display');
            if(pointDisplay) pointDisplay.innerHTML = `⭐ ${currentPoints} Điểm`;
            db.collection("users").doc(currentUser.uid).set({
                points: currentPoints
            }, { merge: true });
        }

        // 1. Khai báo biến toàn cục (Chỉ khai báo 1 lần duy nhất)
        let appData = {};
        let currentLessonIndex = 0;
        let activeTopic = null;
        const rateSlider = document.getElementById('rate-slider');
        const rateValue = document.getElementById('rate-value');
        let recognition; // Biến cho nhận diện giọng nói

        // 2. Load dữ liệu từ database.json
        async function loadDatabase() {
            try {
                const response = await fetch('database.json');
                appData = await response.json();
                renderDashboard(); 
            } catch (error) {
                console.error("Lỗi load database:", error);
                alert("Không tìm thấy file database.json! Hãy đảm bảo bạn đã dùng Live Server hoặc đã upload lên Vercel.");
            }
        }

        // 3. Khởi chạy App
        loadDatabase();

        // 4. Các hàm giao diện và xử lý
        function renderDashboard() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            Object.values(appData).forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.onclick = () => openTopic(topic.id);
                card.innerHTML = `
                    <div class="topic-icon">${topic.icon}</div>
                    <div class="topic-title">${topic.title}</div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${topic.progress}%; background-color: ${topic.color}"></div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }


	// Hàm mới: AI Grammar & Politeness Scoring
        async function checkWithAI() {
            const statusDiv = document.getElementById('voice-status');
            const currentAnswer = document.getElementById('a-en').innerText;
            const spokenText = document.getElementById('voice-status').innerText.replace("Hệ thống nghe được: ", "").replace(/"/g, "");
            
            if (!spokenText || spokenText.includes("❌") || spokenText.includes("✅")) {
                alert("Hãy thu âm câu trả lời trước!"); return;
            }

            statusDiv.innerHTML = "🤖 AI đang phân tích...";
            const API_KEY = "AIzaSyCa78Q_pzZRLqb0pmG2AqE4B1e-CY7w69k"; // <--- BẠN NHẬP API KEY VÀO ĐÂY
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Đánh giá câu trả lời của nhân viên khách sạn. Câu gốc cần nói: "${currentAnswer}". Nhân viên đã nói: "${spokenText}". Hãy chấm điểm ngữ pháp (thang 10), độ lịch sự (thang 10) và gợi ý cách nói chuyên nghiệp hơn bằng tiếng Việt.` }] }]
                    })
                });
                
                const data = await response.json();
                const aiResult = data.candidates[0].content.parts[0].text;
                statusDiv.innerHTML = `<b>Kết quả AI:</b><br>${aiResult.replace(/\n/g, '<br>')}`;
                statusDiv.style.color = "#333";
            } catch (err) {
                statusDiv.innerText = "Lỗi kết nối AI, hãy kiểm tra API Key.";
            }
        }

        // Hàm chấm điểm phát âm và cộng điểm
        function checkPronunciation(spokenText) {
            const statusDiv = document.getElementById('voice-status');
            const aiBtn = document.getElementById('ai-check-btn');
            
            statusDiv.style.display = 'block';
            statusDiv.setAttribute('data-spoken', spokenText); // Lưu text cho tính năng AI
            
            const targetText = activeTopic.lessons[currentLessonIndex].a_en;
            const cleanSpoken = spokenText.toLowerCase().replace(/[.,?!]/g, "");
            const cleanTarget = targetText.toLowerCase().replace(/[.,?!]/g, "");
            const targetWords = cleanTarget.split(" ");
            let matchCount = 0;
            
            targetWords.forEach(word => { 
                if (cleanSpoken.includes(word)) matchCount++; 
            });
            
            const matchRate = matchCount / targetWords.length;
            
            if (matchRate >= 0.6) { 
                // Trả lời ĐÚNG
                statusDiv.innerHTML = `✅ <b>Chính xác!</b><br>Hệ thống nghe được: <i>"${spokenText}"</i>`;
                statusDiv.style.color = "#27ae60"; 
                statusDiv.style.backgroundColor = "#e8f8f5";
                
                if (aiBtn) aiBtn.style.display = 'block'; // Hiện nút AI Check
                showAnswer(); 
                
                // BẮN LỆNH CỘNG 10 ĐIỂM
                addPoints(10);
                console.log("Đã kích hoạt cộng 10 điểm cho tài khoản!"); // Báo ra F12 để theo dõi
                
            } else {
                // Trả lời SAI
                statusDiv.innerHTML = `❌ <b>Chưa chuẩn, hãy thử lại!</b><br>Hệ thống nghe được: <i>"${spokenText}"</i>`;
                statusDiv.style.color = "#c0392b"; 
                statusDiv.style.backgroundColor = "#fdedec";
                
                if (aiBtn) aiBtn.style.display = 'none'; // Ẩn nút AI
            }
        }
        function openTopic(topicId) {
            activeTopic = appData[topicId];
            currentLessonIndex = 0;
            document.documentElement.style.setProperty('--primary-color', activeTopic.color);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'flex';
            document.getElementById('current-topic-title').innerText = activeTopic.title;
            loadLesson();
        }

        function goBack() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.documentElement.style.setProperty('--primary-color', '#008CBA');
            window.speechSynthesis.cancel();
            if(recognition) recognition.stop();
        }

        function loadLesson() {
            const lesson = activeTopic.lessons[currentLessonIndex];
            document.getElementById('q-en').innerText = lesson.q_en;
            document.getElementById('q-vi').innerText = lesson.q_vi;
            document.getElementById('a-en').innerText = lesson.a_en;
            document.getElementById('a-vi').innerText = lesson.a_vi;
            
            document.getElementById('a-group').classList.remove('visible');
            document.getElementById('voice-status').style.display = 'none';
            const mainBtn = document.getElementById('main-btn');
            mainBtn.innerText = "Xem gợi ý trả lời";
            mainBtn.onclick = showAnswer;
        }

        function showAnswer() {
            document.getElementById('a-group').classList.add('visible');
            const mainBtn = document.getElementById('main-btn');
            mainBtn.innerText = "Câu tiếp theo ➔";
            mainBtn.onclick = nextLesson;
        }

        function nextLesson() {
            currentLessonIndex++;
            if (currentLessonIndex >= activeTopic.lessons.length) {
                alert("Hoàn tất chủ đề!");
                goBack();
            } else {
                loadLesson();
            }
        }

        // 5. Cấu hình Audio & Voice
        rateSlider.value = localStorage.getItem('audioRate') || 1.0;
        rateValue.innerText = rateSlider.value + "x";
        rateSlider.oninput = () => {
            rateValue.innerText = rateSlider.value + "x";
            localStorage.setItem('audioRate', rateSlider.value);
        };

        function populateVoiceList() {
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';
            window.speechSynthesis.getVoices().filter(v => v.lang.includes('en')).forEach(v => {
                const opt = document.createElement('option');
                opt.textContent = `🎤 ${v.name} (${v.lang})`;
                opt.value = v.name;
                voiceSelect.appendChild(opt);
            });
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        function playAudio(type) {
            window.speechSynthesis.cancel();
            const lesson = activeTopic.lessons[currentLessonIndex];
            const utterance = new SpeechSynthesisUtterance(type === 'q' ? lesson.q_en : lesson.a_en);
            utterance.voice = window.speechSynthesis.getVoices().find(v => v.name === document.getElementById('voice-select').value);
            utterance.rate = parseFloat(rateSlider.value);
            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
        }

        function startRecording() {
            if (!recognition) { alert("Trình duyệt không hỗ trợ thu âm."); return; }
            const micBtn = document.getElementById('mic-btn');
            micBtn.classList.add('recording'); micBtn.innerText = '🛑';
            recognition.start();
            recognition.onresult = (e) => checkPronunciation(e.results[0][0].transcript);
            recognition.onspeechend = () => { recognition.stop(); micBtn.classList.remove('recording'); micBtn.innerText = '🎙️'; };
        }

       function checkPronunciation(spoken) {
            const status = document.getElementById('voice-status');
            const aiBtn = document.getElementById('ai-check-btn'); // Lấy nút AI
            status.style.display = 'block';
            status.setAttribute('data-spoken', spoken);
            status.innerHTML = `✅ Hệ thống nghe được: "${spoken}"`;
            
            // Dòng này cực kỳ quan trọng để hiện nút AI:
            aiBtn.style.display = 'block'; 
        }

// Hàm quản lý Tab Info
        function showInfo() { document.getElementById('info-screen').style.display = 'flex'; }
        function hideInfo() { document.getElementById('info-screen').style.display = 'none'; }

        // Hàm AI Check
        async function checkWithAI() {
            const statusDiv = document.getElementById('voice-status');
            const spokenText = statusDiv.getAttribute('data-spoken');
            if (!spokenText) { alert("Hãy ghi âm trước!"); return; }
            
            statusDiv.innerHTML = "🤖 AI đang phân tích...";
            const API_KEY = "AIzaSyCa78Q_pzZRLqb0pmG2AqE4B1e-CY7w69k"; // Thay API Key của bạn
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Đánh giá câu trả lời: "${spokenText}". Đáp án mẫu: "${activeTopic.lessons[currentLessonIndex].a_en}". Hãy chấm điểm thái độ và ngữ pháp.` }] }] })
                });
                const data = await response.json();
                statusDiv.innerHTML = `<b>AI Feedback:</b><br>${data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>')}`;
            } catch (err) { statusDiv.innerText = "Lỗi kết nối AI."; }
        }

        // CẬP NHẬT HÀM checkPronunciation cũ của bạn:
        // Tìm hàm checkPronunciation(spoken) và thêm dòng này vào cuối hàm:
        // document.getElementById('ai-check-btn').style.display = 'block';
        // document.getElementById('voice-status').setAttribute('data-spoken', spoken);

// Kiểm tra kết nối mạng (trạng thái AI)
        function updateAIStatus() {
            const statusIndicator = document.getElementById('ai-status');
            if (navigator.onLine) {
                statusIndicator.innerHTML = "AI: 🟢 Online";
                statusIndicator.style.color = "green";
            } else {
                statusIndicator.innerHTML = "AI: 🔴 Offline";
                statusIndicator.style.color = "red";
            }
        }
        // Theo dõi trạng thái mạng liên tục
        window.addEventListener('online', updateAIStatus);
        window.addEventListener('offline', updateAIStatus);
        updateAIStatus(); // Chạy ngay khi mở app
    </script>
