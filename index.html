<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp V2.1</title>
    <style>
        :root {
            --primary-color: #008CBA; 
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .topic-card {
            background: white; border-radius: 16px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s;
        }
        .topic-card:active { transform: scale(0.95); }
        
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        
        .progress-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s; }
        
        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 20px;}
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        /* UI Nút chọn giọng đọc & Tốc độ mới */
        .voice-dropdown {
            width: 100%; max-width: 400px; padding: 12px 15px; margin: 0 auto 15px auto;
            border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 14px;
            background-color: white; color: #333; outline: none; appearance: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: block;
        }
        .speed-control-box {
            width: 100%; max-width: 400px; margin: 0 auto 15px auto; padding: 10px 15px;
            background: white; border-radius: 12px; border: 1px solid #ddd;
            display: flex; align-items: center; gap: 10px; font-size: 14px;
        }

        .flashcard-container { flex: 1; display: flex; align-items: flex-start; justify-content: center; }
        
        .flashcard {
            width: 100%; max-width: 400px; min-height: 400px; 
            background: white; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 30px 20px; text-align: center; box-sizing: border-box;
        }

        .q-group { margin-bottom: 20px; width: 100%; }
        .text-en { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 8px; line-height: 1.3; }
        .text-vi { font-size: 16px; color: #777; font-style: italic; line-height: 1.4; }

        .a-group { 
            width: 100%; opacity: 0; transition: opacity 0.3s; 
            margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 20px;
        }
        .a-group.visible { opacity: 1; }
        .ans-en { font-size: 20px; color: var(--primary-color); font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
        .ans-vi { font-size: 15px; color: #888; font-style: italic; line-height: 1.4; }

        .voice-status {
            width: 100%; margin-top: 15px; padding: 10px; border-radius: 8px;
            font-size: 14px; font-weight: bold; display: none; background: #f9f9f9; box-sizing: border-box;
        }

        .tools-row { display: flex; gap: 20px; margin-top: auto; padding-top: 25px; }
        .icon-btn { 
            width: 50px; height: 50px; border-radius: 25px; 
            background: #f0f2f5; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; border: none; color: #555; transition: background 0.3s;
        }
        .icon-btn.primary { background: var(--primary-color); color: white; }
        .icon-btn.recording { background: #e74c3c; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        .main-action-btn {
            width: 100%; padding: 18px; margin-bottom: 30px;
            background-color: var(--primary-color); color: white; 
            border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">Lộ trình huấn luyện</div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
            <div style="width: 60px;"></div> 
        </div>

        <select id="voice-select" class="voice-dropdown"></select>
        
        <div class="speed-control-box">
            <span>Tốc độ:</span>
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1.0" style="flex:1;">
            <span id="rate-value">1.0x</span>
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div style="font-size: 35px; margin-bottom: 15px;">💬</div>
                
                <div class="q-group">
                    <div class="text-en" id="q-en"></div>
                    <div class="text-vi" id="q-vi"></div>
                </div>
                
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en"></div>
                    <div class="ans-vi" id="a-vi"></div>
                </div>

                <div class="voice-status" id="voice-status"></div>
                
                <div class="tools-row">
                    <button class="icon-btn" onclick="playAudio('q')">🔊</button>
                    <button class="icon-btn primary" id="mic-btn" onclick="startRecording()">🎙️</button>
                    <button class="icon-btn" onclick="playAudio('a')">🎧</button>
                </div>
            </div>
        </div>

        <button class="main-action-btn" id="main-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
    </div>

    <script>
        // BẮT ĐẦU ĐOẠN MỚI
        let appData = {};
        let currentLessonIndex = 0;
        let activeTopic = null;

        async function loadDatabase() {
            try {
                const response = await fetch('database.json');
                appData = await response.json();
                renderDashboard(); // Chỉ render khi đã có dữ liệu
            } catch (error) {
                console.error("Lỗi load database:", error);
                alert("Không tìm thấy file database.json!");
            }
        }

        loadDatabase(); // Gọi hàm load ngay
        // KẾT THÚC ĐOẠN MỚI

        let currentLessonIndex = 0;
        let activeTopic = null;

        /* TÍNH NĂNG MỚI: Xử lý Tốc độ */
        const rateSlider = document.getElementById('rate-slider');
        const rateValue = document.getElementById('rate-value');
        rateSlider.value = localStorage.getItem('audioRate') || 1.0;
        rateValue.innerText = rateSlider.value + "x";
        rateSlider.oninput = () => {
            rateValue.innerText = rateSlider.value + "x";
            localStorage.setItem('audioRate', rateSlider.value);
        };

        

        function openTopic(topicId) {
            activeTopic = appData[topicId];
            currentLessonIndex = 0;
            document.documentElement.style.setProperty('--primary-color', activeTopic.color);
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('learning-screen').style.display = 'flex';
            document.getElementById('current-topic-title').innerText = activeTopic.title;
            loadLesson();
        }

        function goBack() {
            document.getElementById('learning-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.documentElement.style.setProperty('--primary-color', '#008CBA');
            window.speechSynthesis.cancel();
            if(recognition) recognition.stop();
            renderDashboard();
        }

        function loadLesson() {
            const lesson = activeTopic.lessons[currentLessonIndex];
            document.getElementById('q-en').innerText = lesson.q_en;
            document.getElementById('q-vi').innerText = lesson.q_vi;
            document.getElementById('a-en').innerText = lesson.a_en;
            document.getElementById('a-vi').innerText = lesson.a_vi;
            
            document.getElementById('a-group').classList.remove('visible');
            document.getElementById('voice-status').style.display = 'none';
            
            const mainBtn = document.getElementById('main-btn');
            mainBtn.innerText = "Xem gợi ý trả lời";
            mainBtn.onclick = showAnswer;
        }

        function showAnswer() {
            document.getElementById('a-group').classList.add('visible');
            const mainBtn = document.getElementById('main-btn');
            mainBtn.innerText = "Câu tiếp theo ➔";
            mainBtn.onclick = nextLesson;
        }

        function nextLesson() {
            currentLessonIndex++;
            if (currentLessonIndex >= activeTopic.lessons.length) {
                alert("Hoàn tất chủ đề!");
                goBack();
            } else {
                loadLesson();
            }
        }

        let availableVoices = [];
        function populateVoiceList() {
            availableVoices = window.speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            voiceSelect.innerHTML = '';
            const englishVoices = availableVoices.filter(voice => voice.lang.includes('en'));
            if (englishVoices.length === 0) {
                const option = document.createElement('option');
                option.textContent = "Đang tải giọng đọc...";
                voiceSelect.appendChild(option);
                return;
            }
            englishVoices.forEach((voice) => {
                const option = document.createElement('option');
                option.textContent = `🎤 ${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function playAudio(type) {
            window.speechSynthesis.cancel(); 
            const lesson = activeTopic.lessons[currentLessonIndex];
            const textToSpeak = type === 'q' ? lesson.q_en : lesson.a_en;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            const selectedVoiceName = document.getElementById('voice-select').value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            if (selectedVoice) utterance.voice = selectedVoice;
            
            /* SỬ DỤNG TỐC ĐỘ TỪ SLIDER */
            utterance.rate = parseFloat(rateSlider.value); 
            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false; 
            recognition.maxAlternatives = 1;
        }

        function startRecording() {
            if (!recognition) {
                alert("Trình duyệt không hỗ trợ thu âm."); return;
            }
            const micBtn = document.getElementById('mic-btn');
            const statusDiv = document.getElementById('voice-status');
            micBtn.classList.add('recording');
            micBtn.innerText = '🛑';
            statusDiv.style.display = 'block';
            statusDiv.innerText = "Đang nghe...";

            try { recognition.start(); } catch (e) { recognition.stop(); }

            recognition.onresult = (event) => {
                const spokenText = event.results[0][0].transcript;
                checkPronunciation(spokenText);
            };

            recognition.onspeechend = () => { recognition.stop(); resetMicBtn(); };
            recognition.onerror = () => {
                statusDiv.innerText = "Lỗi Micro.";
                resetMicBtn();
            };
        }

        function resetMicBtn() {
            const micBtn = document.getElementById('mic-btn');
            micBtn.classList.remove('recording');
            micBtn.innerText = '🎙️';
        }

        function checkPronunciation(spokenText) {
            const targetText = activeTopic.lessons[currentLessonIndex].a_en;
            const cleanSpoken = spokenText.toLowerCase().replace(/[.,?!]/g, "");
            const cleanTarget = targetText.toLowerCase().replace(/[.,?!]/g, "");
            const targetWords = cleanTarget.split(" ");
            let matchCount = 0;
            targetWords.forEach(word => { if (cleanSpoken.includes(word)) matchCount++; });
            const matchRate = matchCount / targetWords.length;
            const statusDiv = document.getElementById('voice-status');
            
            if (matchRate >= 0.6) { 
                statusDiv.innerHTML = `✅ <b>Chính xác!</b>`;
                showAnswer(); 
            } else {
                statusDiv.innerHTML = `❌ <b>Chưa chuẩn, hãy thử lại!</b>`;
            }
        }

        renderDashboard();
    </script>
</body>
</html>
