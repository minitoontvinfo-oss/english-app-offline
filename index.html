<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Hệ Thống Huấn Luyện Giao Tiếp V2.2</title>
    <style>
        :root { --primary-color: #008CBA; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        /* --- UI DASHBOARD --- */
        #dashboard { padding: 20px; padding-top: 50px; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .topic-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; }
        .topic-card:active { transform: scale(0.95); }
        .topic-icon { font-size: 32px; margin-bottom: 10px; }
        .topic-title { font-size: 16px; font-weight: 700; min-height: 40px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary-color); border-radius: 3px; width: 0%; transition: width 0.5s; }

        /* --- UI MÀN HÌNH HỌC --- */
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px;}
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; padding: 10px 0; }
        .learning-title { font-size: 18px; font-weight: bold; }

        /* AUDIO CONTROL PANEL */
        .audio-controls { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .voice-dropdown { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 14px; }
        .speed-control { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        input[type=range] { flex: 1; accent-color: var(--primary-color); }

        .flashcard-container { flex: 1; display: flex; align-items: flex-start; justify-content: center; }
        .flashcard { width: 100%; max-width: 400px; min-height: 350px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 20px; text-align: center; box-sizing: border-box; }

        .q-group { margin-bottom: 15px; width: 100%; }
        .text-en { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .text-vi { font-size: 15px; color: #777; font-style: italic; }
        .a-group { width: 100%; opacity: 0; transition: opacity 0.3s; margin-top: 10px; border-top: 1px dashed #ddd; padding-top: 15px; }
        .a-group.visible { opacity: 1; }
        .ans-en { font-size: 18px; color: var(--primary-color); font-weight: 600; margin-bottom: 5px; }
        .ans-vi { font-size: 14px; color: #888; font-style: italic; }

        .voice-status { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; display: none; background: #f9f9f9; box-sizing: border-box; }
        .tools-row { display: flex; gap: 15px; margin-top: auto; padding-top: 15px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 25px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; border: none; color: #555; }
        .icon-btn.primary { background: var(--primary-color); color: white; }
        .icon-btn.recording { background: #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .main-action-btn { width: 100%; padding: 18px; margin-bottom: 20px; background-color: var(--primary-color); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">Lộ trình huấn luyện</div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
            <div style="width: 60px;"></div> 
        </div>

        <div class="audio-controls">
            <select id="voice-select" class="voice-dropdown"></select>
            <div class="speed-control">
                <span>0.5x</span>
                <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1.0">
                <span>1.5x</span>
            </div>
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div class="q-group">
                    <div class="text-en" id="q-en"></div>
                    <div class="text-vi" id="q-vi"></div>
                </div>
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en"></div>
                    <div class="ans-vi" id="a-vi"></div>
                </div>
                <div class="voice-status" id="voice-status"></div>
                <div class="tools-row">
                    <button class="icon-btn" onclick="playAudio('q')">🔊</button>
                    <button class="icon-btn primary" id="mic-btn" onclick="startRecording()">🎙️</button>
                    <button class="icon-btn" onclick="playAudio('a')">🎧</button>
                </div>
            </div>
        </div>
        <button class="main-action-btn" id="main-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
    </div>

    <script>
        const appData = {
            resort: { id: 'resort', title: 'Ocean Dunes Resort', icon: '🏨', color: '#008CBA', progress: 50, lessons: [
                { q_en: 'Excuse me, where is the nearest beach?', q_vi: 'Xin lỗi, bãi biển gần nhất ở hướng nào?', a_en: 'Welcome to Ocean Dunes Resort! The beach is just a two-minute walk from here.', a_vi: 'Chào mừng quý khách đến với Ocean Dunes Resort! Bãi biển chỉ cách đây hai phút đi bộ ạ.' }
            ]}
        };

        let currentLessonIndex = 0; let activeTopic = null;

        // Lưu/Tải tốc độ
        const rateSlider = document.getElementById('rate-slider');
        rateSlider.value = localStorage.getItem('audioRate') || 1.0;
        rateSlider.onchange = () => localStorage.setItem('audioRate', rateSlider.value);

        function playAudio(type) {
            window.speechSynthesis.cancel();
            const lesson = activeTopic.lessons[currentLessonIndex];
            const utterance = new SpeechSynthesisUtterance(type === 'q' ? lesson.q_en : lesson.a_en);
            
            // Apply giọng và tốc độ
            const selectedVoiceName = document.getElementById('voice-select').value;
            utterance.voice = window.speechSynthesis.getVoices().find(v => v.name === selectedVoiceName);
            utterance.rate = parseFloat(rateSlider.value); 
            window.speechSynthesis.speak(utterance);
        }

        // Logic cũ (Dashboard & Learning)... 
        function renderDashboard() { /* ...giữ nguyên... */ }
        function openTopic(topicId) { /* ...giữ nguyên... */ }
        function goBack() { window.speechSynthesis.cancel(); document.getElementById('learning-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }
        function loadLesson() { /* ...hiển thị câu hỏi... */ }
        function showAnswer() { document.getElementById('a-group').classList.add('visible'); document.getElementById('main-btn').innerText = "Câu tiếp theo ➔"; document.getElementById('main-btn').onclick = nextLesson; }
        function nextLesson() { currentLessonIndex++; loadLesson(); }

        // Load voices
        function populateVoiceList() {
            const voiceSelect = document.getElementById('voice-select');
            window.speechSynthesis.getVoices().filter(v => v.lang.includes('en')).forEach(v => {
                const opt = document.createElement('option'); opt.textContent = v.name; opt.value = v.name; voiceSelect.appendChild(opt);
            });
        }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoiceList;

        // StartRecording... (giữ nguyên logic AI V2)
        function startRecording() { /* ...như bản V2... */ }
        function checkPronunciation(spoken) { /* ...như bản V2... */ }
        
        // Init
        const grid = document.getElementById('topic-grid');
        Object.values(appData).forEach(t => { const c = document.createElement('div'); c.className='topic-card'; c.onclick=()=>openTopic(t.id); c.innerHTML=`${t.icon}<br>${t.title}`; grid.appendChild(c); });
    </script>
</body>
</html>
