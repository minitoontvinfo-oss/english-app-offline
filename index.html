<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Hệ Thống Huấn Luyện Giao Tiếp V2.3</title>
    <style>
        :root { --primary-color: #008CBA; --bg-color: #f0f2f5; --text-color: #333; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        
        #dashboard { padding: 20px; padding-top: 50px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .topic-card { background: white; border-radius: 16px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        
        #learning-screen { display: none; padding: 20px; height: 100vh; flex-direction: column; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 16px; color: var(--primary-color); font-weight: bold; cursor: pointer; }
        
        .audio-controls { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .voice-dropdown { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; }
        
        .flashcard-container { flex: 1; display: flex; align-items: flex-start; justify-content: center; }
        .flashcard { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        .q-group, .a-group { margin-bottom: 15px; }
        .text-en { font-size: 20px; font-weight: bold; }
        .a-group { opacity: 0; transition: opacity 0.3s; border-top: 1px dashed #ddd; padding-top: 15px; }
        .a-group.visible { opacity: 1; }
        
        .voice-status { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; display: none; background: #f9f9f9; }
        .tools-row { display: flex; gap: 15px; margin-top: 15px; justify-content: center; }
        .icon-btn { width: 50px; height: 50px; border-radius: 25px; background: #f0f2f5; display: flex; justify-content: center; align-items: center; border: none; font-size: 24px; cursor: pointer; }
        .icon-btn.primary { background: var(--primary-color); color: white; }
        
        .main-action-btn { width: 100%; padding: 15px; margin-top: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        /* Nút AI Check hiển thị ẩn ban đầu */
        #ai-check-btn { background-color: #6c5ce7; display: none; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="header-title">Lộ trình huấn luyện</div>
        <div class="grid-container" id="topic-grid"></div>
    </div>

    <div id="learning-screen">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()">❮ Quay lại</div>
            <div class="learning-title" id="current-topic-title">Chủ đề</div>
        </div>

        <div class="audio-controls">
            <select id="voice-select" class="voice-dropdown"></select>
            <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.1" value="1.0" style="width:100%">
        </div>

        <div class="flashcard-container">
            <div class="flashcard">
                <div class="q-group">
                    <div class="text-en" id="q-en"></div>
                    <div class="text-vi" id="q-vi"></div>
                </div>
                <div class="a-group" id="a-group">
                    <div class="ans-en" id="a-en"></div>
                    <div class="ans-vi" id="a-vi"></div>
                </div>
                <div class="voice-status" id="voice-status"></div>
                <div class="tools-row">
                    <button class="icon-btn" onclick="playAudio('q')">🔊</button>
                    <button class="icon-btn primary" id="mic-btn" onclick="startRecording()">🎙️</button>
                    <button class="icon-btn" onclick="playAudio('a')">🎧</button>
                </div>
            </div>
        </div>
        
        <button class="main-action-btn" id="main-btn" onclick="showAnswer()">Xem gợi ý trả lời</button>
        <button class="main-action-btn" id="ai-check-btn" onclick="checkWithAI()">🤖 Chấm điểm chuyên gia (AI)</button>
    </div>

    <script>
        // ... (Giữ nguyên cấu trúc JSON và các hàm Logic cũ)
        const appData = {
            resort: { id: 'resort', title: 'Ocean Dunes Resort', icon: '🏨', color: '#008CBA', progress: 0, 
                lessons: [
                    { q_en: 'Excuse me, where is the nearest beach?', q_vi: 'Xin lỗi, bãi biển gần nhất ở hướng nào?', a_en: 'Welcome to Ocean Dunes Resort! The beach is just a two-minute walk from here.', a_vi: 'Chào mừng quý khách đến với Ocean Dunes Resort! Bãi biển chỉ cách đây hai phút đi bộ ạ.' }
                ]
            }
        };

        let currentLessonIndex = 0; let activeTopic = null;

        function renderDashboard() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            Object.values(appData).forEach(topic => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.onclick = () => openTopic(topic.id);
                card.innerHTML = `<div>${topic.icon}</div><div>${topic.title}</div>`;
                grid.appendChild(card);
            });
        }

        function openTopic(id) { activeTopic = appData[id]; currentLessonIndex = 0; document.getElementById('dashboard').style.display = 'none'; document.getElementById('learning-screen').style.display = 'flex'; loadLesson(); }
        
        function goBack() { document.getElementById('learning-screen').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; }

        function loadLesson() {
            const lesson = activeTopic.lessons[currentLessonIndex];
            document.getElementById('q-en').innerText = lesson.q_en;
            document.getElementById('q-vi').innerText = lesson.q_vi;
            document.getElementById('a-en').innerText = lesson.a_en;
            document.getElementById('a-vi').innerText = lesson.a_vi;
            document.getElementById('a-group').classList.remove('visible');
            document.getElementById('voice-status').style.display = 'none';
            document.getElementById('ai-check-btn').style.display = 'none'; // Ẩn nút AI khi sang câu mới
            document.getElementById('main-btn').onclick = showAnswer;
        }

        function showAnswer() { document.getElementById('a-group').classList.add('visible'); document.getElementById('main-btn').innerText = "Câu tiếp theo ➔"; document.getElementById('main-btn').onclick = () => { currentLessonIndex++; loadLesson(); }; }

        // Logic AI Check
        async function checkWithAI() {
            const statusDiv = document.getElementById('voice-status');
            const spokenText = statusDiv.getAttribute('data-spoken'); // Lấy text đã ghi âm
            if (!spokenText) { alert("Hãy ghi âm trước!"); return; }
            
            statusDiv.innerHTML = "🤖 AI đang phân tích...";
            const API_KEY = "YOUR_API_KEY_HERE"; // Thay API Key của bạn
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Đánh giá câu trả lời: "${spokenText}". Đáp án mẫu: "${activeTopic.lessons[currentLessonIndex].a_en}". Hãy chấm điểm thái độ và ngữ pháp.` }] }] })
                });
                const data = await response.json();
                statusDiv.innerHTML = `<b>AI Feedback:</b><br>${data.candidates[0].content.parts[0].text}`;
            } catch (e) { statusDiv.innerText = "Lỗi AI!"; }
        }

        function checkPronunciation(spoken) {
            const statusDiv = document.getElementById('voice-status');
            statusDiv.style.display = 'block';
            statusDiv.setAttribute('data-spoken', spoken); // Lưu text vào attribute để AI dùng
            statusDiv.innerHTML = `✅ Hệ thống nghe được: "${spoken}"`;
            document.getElementById('ai-check-btn').style.display = 'block'; // HIỆN NÚT AI CHECK
        }

        // Khởi động
        renderDashboard();
    </script>
</body>
</html>
