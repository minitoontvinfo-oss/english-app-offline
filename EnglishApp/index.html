<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>App Học Tiếng Anh</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; user-select: none; }
        .card-container { display: flex; justify-content: center; margin-top: 40px; }
        .flashcard { width: 85%; max-width: 340px; height: 220px; background: white; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; cursor: pointer; padding: 20px; transition: background 0.2s; }
        .flashcard.flipped { background-color: #4CAF50; color: white; }
        .btn { margin-top: 30px; width: 85%; max-width: 340px; padding: 15px; font-size: 18px; background-color: #008CBA; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .status { margin-top: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

    <h1 style="font-size: 24px; margin-top: 20px;">Học Tiếng Anh Chuyên Ngành</h1>
    <div class="card-container">
        <div class="flashcard" id="card" onclick="flipCard()">Đang tải...</div>
    </div>
    <button class="btn" onclick="nextCard()">Từ tiếp theo</button>
    <div class="status" id="history-status">Đang đồng bộ dữ liệu máy...</div>

    <script>
        // Kích hoạt tính năng chạy Offline cho iOS/Android
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        const words = [
            { en: "Welcome to our resort!", vi: "Chào mừng quý khách đến với khu nghỉ dưỡng của chúng tôi!" },
            { en: "How can I help you today?", vi: "Tôi có thể giúp gì cho anh/chị hôm nay ạ?" },
            { en: "Here is your keycard.", vi: "Đây là thẻ phòng của anh/chị." },
            { en: "Enjoy your stay!", vi: "Chúc anh/chị có một kỳ nghỉ vui vẻ!" }
        ];
        
        let currentIndex = 0;
        let isFlipped = false;
        let db;

        // Khởi tạo Cơ sở dữ liệu IndexedDB tại local máy
        const request = indexedDB.open("EnglishAppDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("user_history", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadHistory(); // Tải lịch sử cũ lên app
        };

        function showCard() {
            const card = document.getElementById('card');
            card.textContent = isFlipped ? words[currentIndex].vi : words[currentIndex].en;
            if (isFlipped) card.classList.add('flipped'); else card.classList.remove('flipped');
        }

        function flipCard() {
            isFlipped = !isFlipped;
            showCard();
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            isFlipped = false;
            showCard();
            saveHistory(currentIndex); // Lưu lại vị trí đang học
        }

        // Hàm lưu lịch sử vào bộ nhớ điện thoại
        function saveHistory(index) {
            const tx = db.transaction("user_history", "readwrite");
            tx.objectStore("user_history").put({ id: "current_progress", lastIndex: index });
            document.getElementById('history-status').textContent = `Đã lưu vị trí: Từ số ${index + 1}`;
        }

        // Hàm đọc lịch sử từ bộ nhớ điện thoại khi mở app
        function loadHistory() {
            const tx = db.transaction("user_history", "readonly");
            const request = tx.objectStore("user_history").get("current_progress");
            request.onsuccess = () => {
                if (request.result) {
                    currentIndex = request.result.lastIndex;
                }
                showCard();
                document.getElementById('history-status').textContent = `Học tiếp từ vị trí cũ (Từ số ${currentIndex + 1})`;
            };
        }
    </script>
</body>
</html>
